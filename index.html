<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英雄聯盟 ARAM: 大亂鬥 攻略</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0e1a; color: #c8aa6e; font-family: '微軟正黑體', 'Noto Sans TC', sans-serif; }

    header {
      background: #1a1b21;
      padding: 14px 24px;
      border-bottom: 2px solid #785a28;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 10;
      flex-wrap: wrap;
    }
    header h1 { font-size: 1.2rem; color: #c8aa6e; white-space: nowrap; }

    #search {
      padding: 7px 14px;
      border: 1px solid #785a28;
      border-radius: 4px;
      background: #0d1117;
      color: #c8aa6e;
      font-size: 0.95rem;
      width: 220px;
    }
    #search::placeholder { color: #555; }
    #search:focus { outline: none; border-color: #c8aa6e; }

    .tier-filters { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
    .tier-btn {
      padding: 4px 12px;
      border-radius: 4px;
      border: 1px solid #3a3a3a;
      background: #0d1117;
      color: #888;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: bold;
      transition: all 0.15s;
    }
    .tier-btn:hover { border-color: #c8aa6e; color: #c8aa6e; }
    .tier-btn.active { color: #0a0e1a; border-color: transparent; }
    .tier-btn[data-tier="全部"].active { background: #c8aa6e; color: #0a0e1a; }
    .tier-btn[data-tier="S+"].active { background: #e84057; color: #fff; }
    .tier-btn[data-tier="S"].active  { background: #ff6b35; color: #fff; }
    .tier-btn[data-tier="A"].active  { background: #f5a623; color: #000; }
    .tier-btn[data-tier="B"].active  { background: #7ed321; color: #000; }
    .tier-btn[data-tier="C"].active  { background: #4a90e2; color: #fff; }

    main { padding: 20px; max-width: 1200px; margin: 0 auto; }

    #champion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(82px, 1fr));
      gap: 10px;
      margin-bottom: 24px;
    }

    .champion-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .champion-card:hover { background: #1e2330; }
    .champion-card.active { background: #2a3040; border-color: #c8aa6e; }

    .champion-card img {
      width: 60px;
      height: 60px;
      border-radius: 4px;
      border: 1px solid #3a3a3a;
    }
    .champ-name {
      font-size: 0.65rem;
      margin-top: 4px;
      text-align: center;
      color: #a0a0a0;
      line-height: 1.2;
    }

    .tier-badge {
      position: absolute;
      top: 4px;
      left: 4px;
      font-size: 0.6rem;
      font-weight: bold;
      padding: 1px 5px;
      border-radius: 3px;
      line-height: 1.4;
    }
    .tier-Sp { background: #e84057; color: #fff; }
    .tier-S  { background: #ff6b35; color: #fff; }
    .tier-A  { background: #f5a623; color: #000; }
    .tier-B  { background: #7ed321; color: #000; }
    .tier-C  { background: #4a90e2; color: #fff; }

    #loading { display: none; color: #888; padding: 24px; text-align: center; font-size: 0.9rem; }

    #error-msg {
      display: none;
      color: #e06c6c;
      background: #2a1515;
      border: 1px solid #5a2020;
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 16px;
    }

    #detail-panel {
      display: none;
      background: #1a1b21;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 24px;
    }
    #detail-panel.visible { display: block; }

    #detail-panel h2 {
      font-size: 1.3rem;
      color: #c8aa6e;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-tier-badge {
      font-size: 0.85rem;
      font-weight: bold;
      padding: 3px 12px;
      border-radius: 4px;
    }

    .section { margin-bottom: 24px; }
    .section h3 {
      font-size: 0.78rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid #2a2a2a;
    }

    .items-row { display: flex; flex-wrap: wrap; gap: 10px; }
    .item-slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      width: 64px;
    }
    .item-slot img {
      width: 52px;
      height: 52px;
      border-radius: 4px;
      border: 1px solid #5a5a5a;
      background: #0d1117;
    }
    .item-slot span {
      font-size: 0.6rem;
      color: #a0a0a0;
      text-align: center;
      line-height: 1.3;
    }

    .augments-grid { display: flex; flex-direction: column; gap: 10px; }
    .augment-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .augment-tier-label {
      font-size: 0.72rem;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 3px;
      min-width: 42px;
      text-align: center;
    }
    .aug-prismatic { background: #9b4dca; color: #fff; }
    .aug-gold      { background: #c8aa6e; color: #000; }
    .aug-silver    { background: #777; color: #fff; }

    .augment-tag {
      background: #1e2330;
      border: 1px solid #3a3a5a;
      color: #c8aa6e;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 0.8rem;
    }

    .skill-order { display: flex; align-items: center; gap: 6px; }
    .skill-badge {
      background: #1e2330;
      border: 2px solid #785a28;
      color: #c8aa6e;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      font-weight: bold;
      font-size: 1rem;
    }
    .skill-arrow { color: #444; font-size: 1.2rem; }

    #no-result { display: none; color: #666; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>ARAM: 大亂鬥 攻略</h1>
    <input type="text" id="search" placeholder="搜尋英雄（中文或英文）...">
    <div class="tier-filters">
      <button class="tier-btn active" data-tier="全部">全部</button>
      <button class="tier-btn" data-tier="S+">S+</button>
      <button class="tier-btn" data-tier="S">S</button>
      <button class="tier-btn" data-tier="A">A</button>
      <button class="tier-btn" data-tier="B">B</button>
      <button class="tier-btn" data-tier="C">C</button>
    </div>
  </header>
  <main>
    <div id="champion-grid"></div>
    <div id="no-result">找不到此英雄</div>
    <div id="loading">載入中...</div>
    <div id="error-msg"></div>
    <div id="detail-panel"></div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
